[start]
command:/usr/local/opnsense/scripts/PharosVPN/pharos-service-control.php
parameters: start %s
type:script
message: start pharosvpn instance %s

[stop]
command:/usr/local/opnsense/scripts/PharosVPN/pharos-service-control.php
parameters: stop %s
type:script
message: stop pharosvpn instance %s

[restart]
command:/usr/local/opnsense/scripts/PharosVPN/pharos-service-control.php
parameters: restart %s
type:script
message: restart pharosvpn instance %s
description:Restart PharosVPN

[configure]
command:/usr/local/opnsense/scripts/PharosVPN/pharos-service-control.php
parameters: -a configure %s
type:script
message: configure pharosvpn instances (%s)

[inspect]
command:/usr/local/opnsense/scripts/PharosVPN/pharos-service-control.php
parameters: inspect %s %s
type:script_output
message: inspect a .pharos profile

[status]
command:/usr/local/opnsense/scripts/PharosVPN/pharos-service-control.php
parameters: status %s
type:script_output
message: show pharosvpn UAPI status for %s
