{#
 # Renders the pharos-awg JSON config for one client interface. It references the
 # stored .pharos blob (written to <if>.pharos at 0600 by the service-control
 # script); the daemon resolves + decrypts the profile itself, so no key material
 # is templated here (DESIGN §6). routing=none lets pf policy routing own the LAN
 # decision; the box's own traffic is never routed.
 #}
{% if helpers.exists('OPNsense.PharosVPN.general.enabled') and OPNsense.PharosVPN.general.enabled == '1' %}
{% if helpers.exists('OPNsense.PharosVPN.clients.client') %}
{%   for client in helpers.toList('OPNsense.PharosVPN.clients.client') %}
{%     if TARGET_FILTERS['OPNsense.PharosVPN.clients.client.' ~ loop.index0] or TARGET_FILTERS['OPNsense.PharosVPN.clients.client'] %}
{%       if client.enabled == '1' %}
{
  "interface": {{ client.interface|tojson }},
  "routing": {{ (client.routing|default('none'))|tojson }},
{%         if client.mtu|default('') != '' %}
  "mtu": {{ client.mtu }},
{%         endif %}
  "log_level": "error",
  "profile": {
    "path": "/usr/local/etc/pharosvpn/{{ client.interface }}.pharos",
    "password": {{ (client.password|default(''))|tojson }},
    "profile": {{ (client.selected_profile|default(''))|tojson }},
    "node": {{ (client.selected_node|default(''))|tojson }}
  }
}
{%       endif %}
{%     endif %}
{%   endfor %}
{% endif %}
{% endif %}
